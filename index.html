<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسسه تولیدات رسانه‌ای مذهبی ثارالله</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Vazir Font -->
    <style>
        @font-face {
            font-family: 'Vazir';
            src: url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.eot');
            src: url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.eot?#iefix') format('embedded-opentype'),
                 url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.woff2') format('woff2'),
                 url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.woff') format('woff'),
                 url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazir', sans-serif;
            transition: background-color 0.3s ease, color 0.2s;
        }
        body {
            background-color: #0b0b0b;
            color: #e0d5c0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* ===== THEME ===== */
        body.light-theme {
            background-color: #f5f0eb;
            color: #1e1a1a;
        }
        body.light-theme .card,
        body.light-theme .form-card,
        body.light-theme .admin-panel {
            background: #ffffff;
            color: #1e1a1a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        body.light-theme header {
            background: #1e1a1a;
            color: #f0e6d8;
        }
        body.light-theme .btn-gold {
            background: #b8860b;
            color: #fff;
        }
        body.light-theme .btn-gold:hover {
            background: #d4a017;
        }
        body.light-theme .theme-toggle {
            background: #d4c5b0;
            color: #1e1a1a;
        }
        /* ===== HEADER ===== */
        header {
            background: #121010;
            padding: 15px 30px;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #b8860b;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 2.2rem;
            color: #d4af37;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #f0e6d8;
        }
        .logo-text span {
            color: #d4af37;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-gold {
            background: #b8860b;
            color: #fff;
        }
        .btn-gold:hover {
            background: #d4a017;
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #b8860b;
            color: #d4af37;
        }
        .btn-outline:hover {
            background: #b8860b;
            color: #fff;
        }
        .theme-toggle {
            background: #2a2424;
            border: none;
            color: #d4af37;
            font-size: 1.4rem;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* ===== CARDS ===== */
        .section-title {
            font-size: 1.8rem;
            border-right: 5px solid #d4af37;
            padding-right: 15px;
            margin: 30px 0 25px 0;
            color: #e6dccb;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }
        .card {
            background: #181414;
            padding: 20px 15px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #3a2e2a;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: #b8860b;
        }
        .card i {
            font-size: 2.8rem;
            color: #d4af37;
            margin-bottom: 10px;
        }
        .card h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
            color: #f0e6d8;
        }
        .card p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        /* ===== POSTS ===== */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .post-item {
            background: #181414;
            padding: 16px;
            border-radius: 16px;
            border-right: 4px solid #b8860b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .post-item.pinned {
            border-right-color: #f1c40f;
            background: #1f1a18;
        }
        .post-item .post-info {
            display: flex;
            flex-direction: column;
        }
        .post-item .post-title {
            font-weight: 600;
        }
        .post-item .post-type {
            font-size: 0.75rem;
            opacity: 0.7;
        }
        .post-actions i {
            margin: 0 4px;
            cursor: pointer;
            color: #b8860b;
            font-size: 1.1rem;
        }
        .post-actions i:hover {
            color: #d4af37;
        }
        /* ===== FORM ===== */
        .form-card {
            background: #181414;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #3a2e2a;
            margin: 25px 0;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }
        .form-group label {
            font-weight: 500;
            color: #d4af37;
        }
        .form-group input, .form-group select, .form-group textarea {
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid #3a2e2a;
            background: #0f0d0d;
            color: #e6dccb;
            font-size: 1rem;
        }
        body.light-theme .form-group input,
        body.light-theme .form-group select,
        body.light-theme .form-group textarea {
            background: #f0ece8;
            color: #1e1a1a;
            border-color: #b0a090;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        /* ===== ADMIN PANEL ===== */
        .admin-panel {
            background: #181414;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid #b8860b;
            margin: 30px 0;
        }
        .admin-section {
            margin: 25px 0;
            border-bottom: 1px solid #2f2824;
            padding-bottom: 20px;
        }
        .admin-section h3 {
            color: #d4af37;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .admin-row input {
            flex: 1;
            min-width: 160px;
            padding: 10px 14px;
            border-radius: 30px;
            background: #0f0d0d;
            border: 1px solid #3a2e2a;
            color: #e6dccb;
        }
        body.light-theme .admin-row input {
            background: #f0ece8;
            color: #1e1a1a;
        }
        .admin-row .btn {
            padding: 10px 20px;
        }
        .order-list {
            list-style: none;
            padding: 0;
        }
        .order-list li {
            background: #0f0d0d;
            padding: 10px 16px;
            margin: 6px 0;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            border-right: 3px solid #b8860b;
        }
        body.light-theme .order-list li {
            background: #f5f0eb;
        }
        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            header { flex-direction: column; align-items: stretch; gap: 12px; }
            .header-actions { justify-content: center; }
            .form-row { grid-template-columns: 1fr; }
            .admin-row { flex-direction: column; align-items: stretch; }
        }
        /* ===== MISC ===== */
        .gold-text { color: #d4af37; }
        .mt-2 { margin-top: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .gap-2 { gap: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- HEADER -->
    <header>
        <div class="logo-area" id="logoArea">
            <span class="logo-icon">⚔️</span>
            <span class="logo-text" id="siteTitle">ثار<span>الله</span></span>
        </div>
        <div class="header-actions">
            <button class="btn btn-gold" onclick="document.getElementById('orderForm').scrollIntoView({behavior:'smooth'})">
                <i class="fas fa-pen"></i> ثبت سفارش
            </button>
            <button class="btn btn-outline" id="adminToggleBtn" onclick="toggleAdmin()">
                <i class="fas fa-user-cog"></i> پنل مدیریت
            </button>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <!-- TEAM -->
    <h2 class="section-title"><i class="fas fa-users gold-text"></i> تیم ویرایشگران</h2>
    <div class="grid-4">
        <div class="card"><i class="fas fa-film"></i><h3>تدوینگر</h3><p>حرفه‌ای در تدوین فیلم</p></div>
        <div class="card"><i class="fas fa-cubes"></i><h3>موشن‌گرافیست</h3><p>ساخت موشن گرافیک</p></div>
        <div class="card"><i class="fas fa-paint-brush"></i><h3>طراح گرافیک</h3><p>طراحی پوستر و هویت</p></div>
        <div class="card"><i class="fas fa-microphone-alt"></i><h3>صدابردار</h3><p>ضبط و میکس پادکست</p></div>
    </div>

    <!-- POSTS -->
    <div class="flex-between">
        <h2 class="section-title" style="border-right: none;"><i class="fas fa-thumbtack gold-text"></i> نمونه کارها و پست‌ها</h2>
        <span style="font-size:0.9rem; opacity:0.6;"><i class="fas fa-pin"></i> سنجاق‌شده</span>
    </div>
    <div id="postsContainer" class="posts-grid"></div>

    <!-- ORDER FORM -->
    <h2 class="section-title" id="orderForm"><i class="fas fa-file-signature gold-text"></i> ثبت سفارش</h2>
    <div class="form-card">
        <form id="orderFormElement">
            <div class="form-row">
                <div class="form-group"><label>نام و نام خانوادگی</label><input type="text" id="orderName" placeholder="نام کامل" required></div>
                <div class="form-group"><label>شماره تماس</label><input type="tel" id="orderPhone" placeholder="۰۹۱۲..." required></div>
            </div>
            <div class="form-group"><label>نوع پروژه</label>
                <select id="orderType">
                    <option>تدوین فیلم</option><option>موشن گرافیک</option><option>پادکست مذهبی</option><option>طراحی پوستر</option><option>انیمیشن</option>
                </select>
            </div>
            <div class="form-group"><label>توضیحات</label><textarea id="orderDesc" rows="2" placeholder="توضیحات پروژه..."></textarea></div>
            <button type="submit" class="btn btn-gold"><i class="fas fa-check"></i> ثبت سفارش</button>
        </form>
    </div>

    <!-- ADMIN PANEL (hidden by default) -->
    <div id="adminPanel" class="admin-panel hidden">
        <h2 style="color:#d4af37;"><i class="fas fa-shield-alt"></i> پنل مدیریت</h2>
        
        <div class="admin-section">
            <h3><i class="fas fa-plus-circle"></i> افزودن پست جدید</h3>
            <div class="admin-row">
                <input type="text" id="newPostTitle" placeholder="عنوان پست">
                <select id="newPostType">
                    <option>تدوین فیلم</option><option>موشن گرافیک</option><option>پادکست مذهبی</option><option>طراحی پوستر</option><option>انیمیشن</option>
                </select>
                <button class="btn btn-gold" onclick="addPost()"><i class="fas fa-plus"></i> افزودن</button>
            </div>
        </div>

        <div class="admin-section">
            <h3><i class="fas fa-edit"></i> مدیریت پست‌ها</h3>
            <div id="adminPostsList"></div>
        </div>

        <div class="admin-section">
            <h3><i class="fas fa-cog"></i> تنظیمات سایت</h3>
            <div class="admin-row">
                <input type="text" id="adminLogoText" placeholder="عنوان جدید (مثال: ثارالله)" value="ثارالله">
                <input type="text" id="adminLogoIcon" placeholder="آیکون (مثلاً ⚔️)" value="⚔️">
                <button class="btn btn-gold" onclick="updateSiteBrand()"><i class="fas fa-save"></i> بروزرسانی لوگو</button>
            </div>
            <div class="admin-row" style="margin-top:12px;">
                <button class="btn btn-outline" onclick="toggleTheme()"><i class="fas fa-adjust"></i> تغییر تم (شب/روز)</button>
            </div>
        </div>

        <div class="admin-section">
            <h3><i class="fas fa-list-ul"></i> سفارشات ثبت شده</h3>
            <ul class="order-list" id="ordersList"></ul>
        </div>
    </div>
</div>
<script>
    // ===== STATE =====
    let posts = JSON.parse(localStorage.getItem('sarposts')) || [
        { id: 1, title: 'تیزر عاشورایی', type: 'تدوین فیلم', pinned: true },
        { id: 2, title: 'موشن دعای ندبه', type: 'موشن گرافیک', pinned: false },
        { id: 3, title: 'پادکست سبک زندگی', type: 'پادکست مذهبی', pinned: false },
        { id: 4, title: 'پوستر محرم', type: 'طراحی پوستر', pinned: true },
    ];
    let orders = JSON.parse(localStorage.getItem('sarorders')) || [];
    let nextPostId = posts.length ? Math.max(...posts.map(p=>p.id)) + 1 : 1;

    // ===== DOM REFS =====
    const postsContainer = document.getElementById('postsContainer');
    const adminPostsList = document.getElementById('adminPostsList');
    const ordersList = document.getElementById('ordersList');
    const adminPanel = document.getElementById('adminPanel');
    const themeToggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    // ===== RENDER POSTS =====
    function renderPosts() {
        // sort pinned first
        const sorted = [...posts].sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));
        postsContainer.innerHTML = sorted.map(p => `
            <div class="post-item ${p.pinned ? 'pinned' : ''}">
                <div class="post-info">
                    <span class="post-title">${p.title} ${p.pinned ? '<i class="fas fa-thumbtack" style="color:#f1c40f;font-size:0.8rem;"></i>' : ''}</span>
                    <span class="post-type">${p.type}</span>
                </div>
                <div class="post-actions">
                    <i class="fas fa-thumbtack" onclick="togglePin(${p.id})" title="سنجاق/لغو"></i>
                    <i class="fas fa-trash" onclick="deletePost(${p.id})" style="color:#b8860b;"></i>
                </div>
            </div>
        `).join('');
        renderAdminPosts();
        savePosts();
    }

    function renderAdminPosts() {
        adminPostsList.innerHTML = posts.map(p => `
            <div class="post-item" style="margin:6px 0; padding:8px 14px;">
                <span>${p.title} (${p.type}) ${p.pinned ? '📌' : ''}</span>
                <span>
                    <i class="fas fa-thumbtack" onclick="togglePin(${p.id})" style="cursor:pointer;margin:0 6px;"></i>
                    <i class="fas fa-trash" onclick="deletePost(${p.id})" style="cursor:pointer;color:#b8860b;"></i>
                </span>
            </div>
        `).join('');
    }

    function savePosts() {
        localStorage.setItem('sarposts', JSON.stringify(posts));
    }

    // ===== POST CRUD =====
    function addPost() {
        const title = document.getElementById('newPostTitle').value.trim();
        const type = document.getElementById('newPostType').value;
        if (!title) { alert('عنوان را وارد کنید'); return; }
        posts.push({ id: nextPostId++, title, type, pinned: false });
        renderPosts();
        document.getElementById('newPostTitle').value = '';
    }

    function deletePost(id) {
        if (!confirm('حذف پست؟')) return;
        posts = posts.filter(p => p.id !== id);
        renderPosts();
    }

    function togglePin(id) {
        const p = posts.find(p => p.id === id);
        if (p) { p.pinned = !p.pinned; renderPosts(); }
    }

    // ===== ORDERS =====
    function renderOrders() {
        ordersList.innerHTML = orders.map((o, idx) => `
            <li>
                <span><strong>${o.name}</strong> | ${o.phone} | ${o.type}</span>
                <span style="font-size:0.8rem; opacity:0.7;">${o.desc || ''}</span>
            </li>
        `).join('');
        localStorage.setItem('sarorders', JSON.stringify(orders));
    }

    document.getElementById('orderFormElement').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('orderName').value.trim();
        const phone = document.getElementById('orderPhone').value.trim();
        const type = document.getElementById('orderType').value;
        const desc = document.getElementById('orderDesc').value.trim();
        if (!name || !phone) { alert('نام و شماره تماس الزامی است'); return; }
        orders.push({ name, phone, type, desc });
        renderOrders();
        this.reset();
        alert('سفارش شما با موفقیت ثبت شد.');
    });

    // ===== ADMIN TOGGLE =====
    function toggleAdmin() {
        adminPanel.classList.toggle('hidden');
        if (!adminPanel.classList.contains('hidden')) {
            renderOrders();
            renderAdminPosts();
        }
    }

    // ===== THEME =====
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        themeIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('sartheme', isLight ? 'light' : 'dark');
    }

    // ===== BRAND UPDATE =====
    function updateSiteBrand() {
        const newTitle = document.getElementById('adminLogoText').value.trim() || 'ثارالله';
        const newIcon = document.getElementById('adminLogoIcon').value.trim() || '⚔️';
        document.querySelector('.logo-text').innerHTML = newTitle.replace('الله', '<span>الله</span>');
        document.querySelector('.logo-icon').textContent = newIcon;
        localStorage.setItem('sarbrand', JSON.stringify({ title: newTitle, icon: newIcon }));
        alert('لوگو بروزرسانی شد.');
    }

    // ===== LOAD SAVED BRAND =====
    function loadBrand() {
        const saved = localStorage.getItem('sarbrand');
        if (saved) {
            try {
                const { title, icon } = JSON.parse(saved);
                document.querySelector('.logo-text').innerHTML = title.replace('الله', '<span>الله</span>');
                document.querySelector('.logo-icon').textContent = icon;
                document.getElementById('adminLogoText').value = title;
                document.getElementById('adminLogoIcon').value = icon;
            } catch(e) {}
        }
    }

    // ===== LOAD SAVED THEME =====
    function loadTheme() {
        const theme = localStorage.getItem('sartheme');
        if (theme === 'light') {
            document.body.classList.add('light-theme');
            themeIcon.className = 'fas fa-sun';
        } else {
            themeIcon.className = 'fas fa-moon';
        }
    }

    // ===== INIT =====
    loadTheme();
    loadBrand();
    renderPosts();
    renderOrders();
    // expose functions
    window.toggleTheme = toggleTheme;
    window.toggleAdmin = toggleAdmin;
    window.addPost = addPost;
    window.deletePost = deletePost;
    window.togglePin = togglePin;
    window.updateSiteBrand = updateSiteBrand;
</script>
</body>
</html>
