<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثارالله | تولیدات رسانه‌ای مذهبی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #0d1117;
            --bg-card: #111827;
            --accent-primary: #1e3a5f;
            --accent-secondary: #2563eb;
            --gold: #c9a84c;
            --gold-light: #d4b860;
            --gold-dark: #a88a3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #1e293b;
            --red: #991b1b;
            --green: #166534;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.7;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

        /* ========== هدر سایت ========== */
        .site-header {
            background: rgba(13,17,23,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .header-logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: var(--bg-primary);
            box-shadow: 0 0 25px rgba(201,168,76,0.3);
        }

        .header-logo-text {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .header-nav a:hover {
            color: #fff;
            background: rgba(30,58,95,0.3);
        }

        .header-nav a.active {
            color: var(--gold);
            background: rgba(201,168,76,0.1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--bg-primary);
            box-shadow: 0 4px 15px rgba(201,168,76,0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201,168,76,0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* ========== هیرو سکشن ========== */
        .hero-section {
            position: relative;
            overflow: hidden;
            padding: 80px 20px;
            text-align: center;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(30,58,95,0.4) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 100%, rgba(201,168,76,0.1) 0%, transparent 70%);
        }

        .hero-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: 
                radial-gradient(circle at 30% 50%, #c9a84c 1px, transparent 1px),
                radial-gradient(circle at 70% 50%, #2563eb 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(201,168,76,0.15);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 16px;
            line-height: 1.3;
            letter-spacing: -1px;
        }

        .hero-title span {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .hero-stat {
            text-align: center;
        }

        .hero-stat-number {
            font-size: 36px;
            font-weight: 900;
            color: var(--gold);
            display: block;
        }

        .hero-stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ========== سکشن‌ها ========== */
        .section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 32px;
            background: linear-gradient(180deg, var(--gold), var(--gold-dark));
            border-radius: 2px;
        }

        .section-link {
            color: var(--gold);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .section-link:hover {
            text-decoration: underline;
        }

        /* ========== کارت‌ها ========== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .cards-grid.small {
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(30,58,95,0.2);
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--accent-primary);
        }

        .card-body {
            padding: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .card-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .card-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-gold {
            background: rgba(201,168,76,0.15);
            color: var(--gold);
            border: 1px solid rgba(201,168,76,0.3);
        }

        .badge-blue {
            background: rgba(37,99,235,0.15);
            color: var(--blue-light, #60a5fa);
        }

        .badge-green {
            background: rgba(22,101,52,0.15);
            color: #4ade80;
        }

        .badge-red {
            background: rgba(153,27,27,0.15);
            color: #f87171;
        }

        /* ========== کمپین‌ها ========== */
        .campaigns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .campaign-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .campaign-progress {
            margin: 16px 0;
        }

        .campaign-progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .campaign-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-secondary), var(--gold));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .campaign-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* ========== تب‌ها ========== */
        .tabs {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tab {
            padding: 10px 20px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            font-family: inherit;
            white-space: nowrap;
            transition: all 0.2s;
            font-weight: 500;
        }

        .tab:hover {
            color: #fff;
        }

        .tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ========== جدول ========== */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 14px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            background: rgba(13,17,23,0.5);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 20px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(30,58,95,0.2);
        }

        /* ========== فوتر ========== */
        .site-footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 60px 20px 30px;
            margin-top: 60px;
        }

        .footer-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }

        .footer-col h4 {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
        }

        .footer-col a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 0;
            transition: color 0.2s;
        }

        .footer-col a:hover {
            color: var(--gold);
        }

        .footer-bottom {
            max-width: 1400px;
            margin: 40px auto 0;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ========== مودال ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        .form-input::placeholder {
            color: #64748b;
        }

        /* ========== پلیر صوتی ========== */
        .audio-player {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .audio-player audio {
            flex: 1;
            height: 40px;
        }

        /* ========== پین نقشه ========== */
        .map-container {
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .map-container .leaflet-container {
            height: 100%;
            background: var(--bg-secondary) !important;
        }

        .map-container .leaflet-tile-pane {
            filter: invert(1) hue-rotate(180deg) brightness(0.6) saturate(0.5);
        }

        /* ========== Toast ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 280px;
        }

        .toast.success { border-right: 3px solid #4ade80; }
        .toast.error { border-right: 3px solid #f87171; }
        .toast.warning { border-right: 3px solid #fbbf24; }
        .toast.info { border-right: 3px solid #60a5fa; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 32px;
            }
            .hero-stats {
                gap: 24px;
            }
            .hero-stat-number {
                font-size: 28px;
            }
            .header-nav {
                display: none;
            }
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .campaigns-grid {
                grid-template-columns: 1fr;
            }
            .section {
                padding: 40px 16px;
            }
        }

        /* ========== حالت مخفی ========== */
        .hidden {
            display: none !important;
        }
    </style>
</head>

        // ==================== Toast ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

            return num.toLocaleString('fa-IR');

                'فاطمیه': '#991b1b',
                'رمضان': '#166534',
                'شعبانیه': '#166534',
                'عید': '#166534',
            };
            return colors[occasion] || '#1e3a5f';
        }

        function getStyleBadge(style) {
            const badges = {
                'شور': 'badge-red',
                'روضه': 'badge-red',
                'زمینه': 'badge-blue',
                'واحد': 'badge-gold',
                'مولودی': 'badge-green',

            return badges[style] || 'badge-blue';

            if (view === 'admin-dashboard') {
                navigate('admin-dashboard');

                showToast('در حال انتقال به بخش ' + view, 'info');

        function handleDonate(campaignId) {

        function playAudio(title, artist) {
            document.getElementById('audio-player-section').classList.remove('hidden');
            document.getElementById('now-playing-title').textContent = title;
            document.getElementById('now-playing-artist').textContent = '🎤 ' + artist;
            showToast('در حال پخش: ' + title, 'info');
        }

        function closePlayer() {
            document.getElementById('audio-player-section').classList.add('hidden');
            const audioEl = document.getElementById('audio-player-element');
            if (audioEl) audioEl.pause();
        }

        function showPoemDetail(poemId) {
            const poem = sampleData.poems.find(p => p.id === poemId);
            if (poem) {
                alert(`${poem.title}\n\n${poem.verses.join('\n')}\n\n✍️ ${poem.poet}`);
            }
        }

        function filterMedia(query) {
            // Simple client-side filter
            const grid = document.getElementById('media-grid');
            if (!grid) return;
            
            const cards = grid.querySelectorAll('.card');
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                if (query === '' || text.includes(query.toLowerCase())) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function filterMediaByStyle(style) {
            const grid = document.getElementById('media-grid');
            if (!grid) return;
            
            const cards = grid.querySelectorAll('.card');
            cards.forEach(card => {
                if (style === 'all' || card.textContent.includes(style)) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function performSearch(query) {
            const resultsDiv = document.getElementById('search-results');
            if (!resultsDiv) return;
            
            if (query.length < 2) {
                resultsDiv.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">برای شروع جستجو، عبارت مورد نظر را تایپ کنید</p>';
                return;
            }

            const allContent = [
                ...sampleData.media.map(m => ({ type: 'مداحی', title: m.title, desc: m.artist })),
                ...sampleData.poems.map(p => ({ type: 'شعر', title: p.title, desc: p.poet })),
                ...sampleData.campaigns.map(c => ({ type: 'کمپین', title: c.title, desc: c.description })),
            ];

            const results = allContent.filter(item => 
                item.title.includes(query) || item.desc.includes(query)
            );

            if (results.length === 0) {
                resultsDiv.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">نتیجه‌ای یافت نشد</p>';
            } else {
                resultsDiv.innerHTML = results.map(r => `
                    <div class="card" style="margin-bottom: 12px; cursor: pointer;">
                        <div class="card-body">
                            <span class="card-badge badge-gold" style="margin-bottom: 8px; display: inline-block;">${r.type}</span>
                            <h3 class="card-title">${r.title}</h3>
                            <p class="card-text">${r.desc}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        function initMap() {
            const mapEl = document.getElementById('nazri-map');
            if (!mapEl) return;

            if (mapInstance) {
                mapInstance.remove();
            }

            mapInstance = L.map('nazri-map').setView([35.6892, 51.3890], 12);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                className: 'map-tiles',
            }).addTo(mapInstance);

            // Add markers
            sampleData.nazriLocations.forEach(loc => {
                const marker = L.marker([loc.lat, loc.lng]).addTo(mapInstance);
                marker.bindPopup(`
                    <div style="font-family: Vazirmatn, sans-serif; text-align: right;">
                        <strong>${loc.title}</strong><br>
                        🍽️ ${loc.foodType}<br>
                        📅 ${loc.date}<br>
                        وضعیت: ${loc.status}
                    </div>
                `);
            });
        }

        function focusMapLocation(lat, lng) {
            if (mapInstance) {
                mapInstance.setView([lat, lng], 15);
            }
            window.scrollTo({ top: document.getElementById('nazri-map').offsetTop - 100, behavior: 'smooth' });
        }

            // Initialize any audio-related functionality
        }

        // ==================== Initialize ====================
        function init() {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const [view, tab] = hash.split('/');
                navigate(view, { tab });
            } else {
                navigate('home');
            }
        }

        // Handle hash changes
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.replace('#', '');
            const [view, tab] = hash.split('/');
            navigate(view, { tab });
        });

        // Start the app
        init();
