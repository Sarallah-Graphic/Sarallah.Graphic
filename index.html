<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثارالله | تولیدات رسانه‌ای مذهبی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { background-color: #2a1a10; color: white; font-family: sans-serif; }
        .brown-box { background-color: #1a0f08; border: 2px solid #c49a6c; }
        .gold-text { color: #c49a6c; }
        
        /* استایل مودال و پنل ادمین */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; overflow-y: auto; padding: 20px; }
        .modal-content { max-width: 800px; margin: 50px auto; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #c49a6c; }
        .admin-input { background: #2a2a2a; border: 1px solid #444; padding: 8px; border-radius: 5px; color: white; width: 100%; margin-bottom: 10px; }
        .table-admin { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table-admin th, .table-admin td { border: 1px solid #444; padding: 10px; text-align: right; }
        .btn-action { padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .btn-del { background: #dc2626; color: white; }
        .btn-del:hover { background: #b91c1c; }
        .btn-status { background: #d97706; color: white; }
        .btn-status:hover { background: #b45309; }
    </style>
</head>
<body class="bg-[url('https://www.transparenttextures.com/patterns/wood-1.png')] bg-cover bg-fixed">

    <!-- دکمه ورود به ادمین (مخفی در سایت) -->
    <button onclick="openLogin()" class="fixed top-4 left-4 bg-gray-800/80 hover:bg-gray-700 px-4 py-2 rounded-full text-xs border border-gray-600 z-50 transition">
        <i class="ri-lock-line"></i> مدیریت
    </button>

    <!-- ================= سایت اصلی ================= -->
    <div class="container mx-auto px-4 py-10">
        <!-- پیام موفقیت ارسال ایمیل -->
        <div id="successMessage" class="hidden max-w-2xl mx-auto bg-green-600/80 border border-green-500 text-center p-3 rounded mb-6 shadow-lg"></div>

        <header class="text-center">
            <div class="brown-box inline-block p-6 rounded-2xl shadow-2xl bg-opacity-80 backdrop-blur-sm">
                <h1 class="text-4xl md:text-5xl font-bold gold-text">ثارالله | تولیدات رسانه‌ای مذهبی</h1>
            </div>
            <h2 class="text-2xl mt-6 gold-text opacity-90 italic font-light">روایت حقیقت با هنر رسانه</h2>
            <div class="mt-4 flex justify-center">
                <span class="bg-[#c49a6c] text-[#1a0f08] px-6 py-2 font-bold rounded-full text-sm shadow-lg">تولید تخصصی آثار رسانه‌ای مذهبی و انقلابی</span>
            </div>
        </header>

        <section class="mt-16 max-w-5xl mx-auto">
            <h3 class="text-3xl text-center mb-10 border-2 border-[#c49a6c] w-fit mx-auto px-12 py-3 rounded-xl brown-box">خدمات ما</h3>
            <div id="servicesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- خدمات توسط جاوااسکریپت بارگذاری می‌شوند -->
            </div>
        </section>

        <section class="mt-20 mb-10 max-w-4xl mx-auto bg-[#1a0f08] bg-opacity-80 p-8 rounded-2xl border border-[#c49a6c] shadow-2xl">
            <h4 class="text-xl font-bold text-center gold-text mb-4">ثبت سفارش (ارسال مستقیم به ایمیل ادمین)</h4>
            <form id="orderForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                <input type="text" id="orderName" placeholder="نام و نام خانوادگی" required class="bg-[#2a1a10] border border-gray-600 p-3 rounded text-white focus:border-[#c49a6c] outline-none w-full">
                <input type="tel" id="orderPhone" placeholder="شماره تماس" required class="bg-[#2a1a10] border border-gray-600 p-3 rounded text-white focus:border-[#c49a6c] outline-none w-full">
                <textarea id="orderDesc" placeholder="توضیحات سفارش" required class="md:col-span-2 bg-[#2a1a10] border border-gray-600 p-3 rounded text-white focus:border-[#c49a6c] outline-none w-full h-24 resize-none"></textarea>
                <button type="submit" class="md:col-span-2 bg-[#c49a6c] hover:bg-[#b08858] text-[#1a0f08] font-bold py-3 rounded text-lg transition duration-300 shadow-lg">ثبت سفارش</button>
            </form>
        </section>

        <footer class="text-center border-t border-[#c49a6c]/40 pt-8 pb-4 opacity-80">
            <div class="bg-[#c49a6c] text-[#1a0f08] px-8 py-3 rounded-full text-xl font-bold inline-block shadow-xl mb-4">
                <i class="ri-instagram-line mr-2"></i> @Sarallah.Graphic
            </div>
            <p class="text-gray-400 text-sm mt-4">کلیه حقوق محفوظ است | طراحی شده با هنر رسانه</p>
        </footer>
    </div>

    <!-- ================= پنل مدیریت (مخفی - در مرورگر ذخیره می‌شود) ================= -->
    <div id="adminPanel">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
                <h2 class="text-2xl font-bold gold-text"><i class="ri-admin-line"></i> پنل مدیریت</h2>
                <button onclick="closeAdmin()" class="text-red-500 hover:text-red-400 text-2xl"><i class="ri-close-circle-line"></i></button>
            </div>

            <!-- فرم افزودن خدمت -->
            <div class="mb-8 border-b border-gray-700 pb-6">
                <h3 class="text-lg font-bold text-white mb-3">افزودن خدمت جدید</h3>
                <input type="text" id="newTitle" placeholder="عنوان خدمت (مثلا: طراحی بنر)" class="admin-input">
                <input type="text" id="newDesc" placeholder="توضیحات کوتاه" class="admin-input">
                <button onclick="addService()" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded font-bold transition">افزودن خدمت</button>
            </div>

            <!-- لیست خدمات (قابل حذف) -->
            <div class="mb-8">
                <h3 class="text-lg font-bold text-white mb-3">لیست خدمات (برای حذف)</h3>
                <div id="adminServicesList" class="space-y-2"></div>
            </div>

            <!-- لیست سفارشات -->
            <div>
                <h3 class="text-lg font-bold text-white mb-3">لیست سفارشات</h3>
                <div id="adminOrdersList" class="text-sm text-gray-300"></div>
            </div>
        </div>
    </div>

    <!-- ================= جاوااسکریپت (منطق اصلی برنامه) ================= -->
    <script>
        // کلیدهای ذخیره‌سازی در مرورگر
        const STORAGE_KEY_SERVICES = 'sarallah_services';
        const STORAGE_KEY_ORDERS = 'sarallah_orders';

        // داده‌های اولیه (اگر کاربر اولین بار وارد شود)
        const defaultServices = [
            { id: 1, title: "طراحی پوستر مذهبی", desc: "طراحی حرفه‌ای پوستر برای مراسمات و همایش‌ها." },
            { id: 2, title: "تایپوگرافی حرفه‌ای", desc: "پیاده‌سازی تایپوگرافی های ناب فارسی و عربی." },
            { id: 3, title: "موشن‌گرافیک مذهبی", desc: "ساخت انیمیشن‌های کوتاه برای انتقال مفاهیم عمیق." }
        ];

        // توابع کمکی برای کار با LocalStorage
        function getData(key, defaultVal = []) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : defaultVal;
        }
        function setData(key, val) {
            localStorage.setItem(key, JSON.stringify(val));
        }

        // تابع رندر کردن سایت اصلی
        function renderSite() {
            const services = getData(STORAGE_KEY_SERVICES, defaultServices);
            // اگر دیتا خالی بود، دیفالت را ذخیره کن
            if(services.length === 0) setData(STORAGE_KEY_SERVICES, defaultServices);

            const container = document.getElementById('servicesContainer');
            container.innerHTML = '';
            
            if(services.length > 0) {
                services.forEach(s => {
                    container.innerHTML += `
                        <div class="bg-[#2f1f14] border-r-4 border-[#c49a6c] p-6 rounded-r-lg shadow-xl hover:translate-y-[-5px] transition duration-300">
                            <h4 class="text-xl font-bold text-white mb-2">${s.title}</h4>
                            <p class="text-gray-300 text-sm leading-relaxed">${s.desc}</p>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-10 bg-black/20 rounded-lg">هیچ خدمتی تعریف نشده است.</div>`;
            }
        }

        // --- توابع پنل مدیریت ---

        // باز کردن لاگین (با رمز ساده 1234 جهت امنیت)
        function openLogin() {
            const pass = prompt("لطفاً رمز عبور پنل مدیریت را وارد کنید:");
            if (pass === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
                renderAdmin();
            } else if(pass !== null) {
                alert("رمز عبور اشتباه است!");
            }
        }

        // بستن پنل
        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
            renderSite(); // رفرش سایت پس از تغییرات
        }

        // رندر کردن پنل مدیریت
        function renderAdmin() {
            const services = getData(STORAGE_KEY_SERVICES);
            const orders = getData(STORAGE_KEY_ORDERS);

            // لیست خدمات در پنل
            const serviceList = document.getElementById('adminServicesList');
            serviceList.innerHTML = '';
            services.forEach(s => {
                serviceList.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-800 p-3 rounded mb-2">
                        <div>
                            <span class="font-bold text-white">${s.title}</span>
                            <span class="text-gray-400 text-xs block">${s.desc}</span>
                        </div>
                        <button onclick="deleteService(${s.id})" class="btn-action btn-del"><i class="ri-delete-bin-line"></i> حذف</button>
                    </div>
                `;
            });

            // لیست سفارشات در پنل
            const orderList = document.getElementById('adminOrdersList');
            orderList.innerHTML = '';
            if(orders.length > 0) {
                // ایجاد جدول
                let tableHtml = `<table class="table-admin"><thead><tr><th>نام</th><th>تلفن</th><th>توضیحات</th><th>عملیات</th></tr></thead><tbody>`;
                orders.forEach(o => {
                    tableHtml += `
                        <tr>
                            <td>${o.name}</td>
                            <td>${o.phone}</td>
                            <td class="max-w-[150px] truncate" title="${o.desc}">${o.desc}</td>
                            <td>
                                <button onclick="deleteOrder('${o.id}')" class="btn-action btn-del"><i class="ri-delete-bin-line"></i></button>
                            </td>
                        </tr>
                    `;
                });
                tableHtml += `</tbody></table>`;
                orderList.innerHTML = tableHtml;
            } else {
                orderList.innerHTML = `<p class="text-gray-500 text-center py-4">هیچ سفارشی ثبت نشده است.</p>`;
            }
        }

        // افزودن خدمت
        function addService() {
            const title = document.getElementById('newTitle').value;
            const desc = document.getElementById('newDesc').value;
            if(!title || !desc) return alert("لطفاً هر دو فیلد را پر کنید!");

            let services = getData(STORAGE_KEY_SERVICES);
            const newId = services.length > 0 ? Math.max(...services.map(s => s.id)) + 1 : 1;
            services.push({ id: newId, title: title, desc: desc });
            setData(STORAGE_KEY_SERVICES, services);

            document.getElementById('newTitle').value = '';
            document.getElementById('newDesc').value = '';
            renderAdmin();
        }

        // حذف خدمت
        function deleteService(id) {
            if(!confirm("آیا مطمئن هستید که می‌خواهید این خدمت را حذف کنید؟")) return;
            let services = getData(STORAGE_KEY_SERVICES);
            services = services.filter(s => s.id !== id);
            setData(STORAGE_KEY_SERVICES, services);
            renderAdmin();
        }

        // حذف سفارش
        function deleteOrder(id) {
            if(!confirm("آیا این سفارش را حذف می‌کنید؟")) return;
            let orders = getData(STORAGE_KEY_ORDERS);
            orders = orders.filter(o => o.id !== id);
            setData(STORAGE_KEY_ORDERS, orders);
            renderAdmin();
        }

        // --- سیستم ارسال فرم سفارش به ایمیل (بدون دیتابیس) ---
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('orderName').value;
            const phone = document.getElementById('orderPhone').value;
            const desc = document.getElementById('orderDesc').value;
            const msgBox = document.getElementById('successMessage');

            // 1. ذخیره در مرورگر (برای پنل ادمین)
            let orders = getData(STORAGE_KEY_ORDERS);
            const newId = Date.now().toString();
            orders.unshift({ id: newId, name: name, phone: phone, desc: desc });
            setData(STORAGE_KEY_ORDERS, orders);

            // 2. ارسال ایمیل (با استفاده از سرویس رایگان Formspree)
            // ⚠️ توجه: ایمیل زیر را به ایمیل واقعی خودتان تغییر دهید.
            const formData = new FormData();
            formData.append('name', name);
            formData.append('phone', phone);
            formData.append('message', desc);

            try {
                // آدرس زیر یک فرم رایگان در سایت formspree.io است. شما باید در آن سایت ثبت‌نام کنید و ایمیل خود را تایید کنید تا ایمیل‌ها به دستتان برسد.
                // به جای این آدرس، آدرس مخصوص به خودتان را در formspree قرار دهید.
                const response = await fetch('https://formspree.io/f/movjjzqg', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    msgBox.textContent = "✅ سفارش شما با موفقیت ثبت شد! به زودی با شما تماس می‌گیریم.";
                    msgBox.classList.remove('hidden');
                    document.getElementById('orderForm').reset();
                    setTimeout(() => msgBox.classList.add('hidden'), 6000);
                } else {
                    throw new Error("خطا در ارسال ایمیل");
                }
            } catch (error) {
                msgBox.textContent = "⚠️ سفارش در مرورگر ذخیره شد، اما ایمیل ارسال نشد. لطفاً با پشتیبانی تماس بگیرید.";
                msgBox.classList.remove('hidden');
                msgBox.classList.add('bg-yellow-600/80', 'border-yellow-500');
                setTimeout(() => {
                    msgBox.classList.add('hidden');
                    msgBox.classList.remove('bg-yellow-600/80', 'border-yellow-500');
                }, 8000);
            }
        });

        // اجرای اولیه سایت
        renderSite();
    </script>
</body>
</html>
