<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسسه رسانه‌ای ثارالله | تولیدات مذهبی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #1e3a5f;
            --accent-light: #2a5298;
            --gold: #c9a84c;
            --gold-light: #e0c878;
            --border: #1e293b;
            --danger: #991b1b;
            --success: #065f46;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        .light-mode {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent: #1e3a5f;
            --accent-light: #3b82f6;
            --border: #cbd5e1;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            transition: var(--transition);
            min-height: 100vh;
        }

        /* هدر اصلی */
        .main-header {
            background: linear-gradient(135deg, #0a0e17 0%, #111827 50%, #1a1f2e 100%);
            border-bottom: 2px solid var(--accent);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        .light-mode .main-header {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            border-bottom: 2px solid var(--accent-light);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: var(--gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .site-title {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .site-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: block;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .order-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: var(--transition);
            border: 2px solid transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 58, 95, 0.5);
            border-color: var(--gold);
        }

        .admin-login-btn {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-login-btn:hover {
            border-color: var(--accent-light);
            background: rgba(30, 58, 95, 0.1);
        }

        .theme-toggle {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-primary);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: white;
        }

        /* محتوای اصلی */
        .main-content {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 30px;
        }

        /* بخش ویرایشگرها */
        .editors-section {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(to right, var(--accent), var(--gold));
            border-radius: 3px;
        }

        .editors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .editor-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
        }

        .editor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border-color: var(--accent-light);
        }

        .editor-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent), #1a1f2e);
            color: var(--gold);
        }

        .editor-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .editor-role {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .editor-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .skill-tag {
            background: var(--accent);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* بخش پست‌ها */
        .posts-section {
            margin-bottom: 40px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
        }

        .post-card.pinned {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.2);
        }

        .pinned-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gold);
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10;
        }

        .post-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--gold);
        }

        .post-content {
            padding: 25px;
        }

        .post-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .post-excerpt {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .post-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* فرم سفارش */
        .order-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .order-modal.active {
            display: flex;
        }

        .order-form {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 40px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid var(--accent);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-light);
            box-shadow: 0 0 15px rgba(30, 58, 95, 0.3);
        }

        .submit-order {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .submit-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(30, 58, 95, 0.5);
        }

        /* پنل مدیریت */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            overflow-y: auto;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-container {
            max-width: 1200px;
            margin: 30px auto;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 40px;
            border: 2px solid var(--accent);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .admin-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .admin-tab {
            padding: 12px 24px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }

        .admin-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent-light);
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .close-admin {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .logo-upload {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .current-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--gold);
            border: 3px solid var(--gold);
        }

        .save-settings {
            background: var(--success);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: var(--transition);
        }

        .save-settings:hover {
            opacity: 0.9;
        }

        .post-manager {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            margin: 5px;
        }

        .btn-primary {
            background: var(--accent-light);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-warning {
            background: var(--gold);
            color: #000;
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .header-actions {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .editors-grid,
            .posts-grid {
                grid-template-columns: 1fr;
            }
            
            .admin-tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- هدر اصلی -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-section">
                <div class="logo-icon" id="headerLogo">⚔️</div>
                <div>
                    <span class="site-title" id="siteTitleDisplay">ثارالله</span>
                    <span class="site-subtitle">موسسه تولیدات رسانه‌ای مذهبی</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()" title="تغییر تم">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <button class="order-btn" onclick="openOrderModal()">
                    <i class="fas fa-clipboard-list"></i> ثبت سفارش
                </button>
                <button class="admin-login-btn" onclick="openAdminPanel()">
                    <i class="fas fa-user-shield"></i> پنل مدیریت
                </button>
            </div>
        </div>
    </header>

    <!-- محتوای اصلی -->
    <main class="main-content">
        <!-- بخش ویرایشگرها -->
        <section class="editors-section">
            <h2 class="section-title">🎬 تیم ویرایشگران حرفه‌ای</h2>
            <div class="editors-grid" id="editorsGrid">
                <!-- ویرایشگرها با جاوااسکریپت بارگذاری می‌شوند -->
            </div>
        </section>

        <!-- بخش پست‌ها -->
        <section class="posts-section">
            <h2 class="section-title">📌 آخرین تولیدات و اخبار</h2>
            <div class="posts-grid" id="postsGrid">
                <!-- پست‌ها با جاوااسکریپت بارگذاری می‌شوند -->
            </div>
        </section>
    </main>

    <!-- مودال ثبت سفارش -->
    <div class="order-modal" id="orderModal">
        <div class="order-form">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--gold);">📋 فرم ثبت سفارش</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>👤 نام و نام خانوادگی</label>
                    <input type="text" required placeholder="نام کامل خود را وارد کنید">
                </div>
                <div class="form-group">
                    <label>📱 شماره تماس</label>
                    <input type="tel" required placeholder="09123456789">
                </div>
                <div class="form-group">
                    <label>🎯 نوع پروژه</label>
                    <select required>
                        <option value="">انتخاب کنید...</option>
                        <option value="video">تدوین فیلم</option>
                        <option value="motion">موشن گرافیک</option>
                        <option value="podcast">پادکست مذهبی</option>
                        <option value="design">طراحی پوستر</option>
                        <option value="animation">انیمیشن</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📝 توضیحات پروژه</label>
                    <textarea rows="5" required placeholder="توضیحات کامل پروژه مورد نظر خود را بنویسید..."></textarea>
                </div>
                <button type="submit" class="submit-order">📤 ثبت سفارش</button>
            </form>
            <button onclick="closeOrderModal()" style="margin-top: 15px; width: 100%; background: transparent; border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; color: var(--text-primary);">انصراف</button>
        </div>
    </div>

    <!-- پنل مدیریت -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-container">
            <div class="admin-header">
                <h2 style="color: var(--gold);">🛡️ پنل مدیریت ثارالله</h2>
                <button class="close-admin" onclick="closeAdminPanel()">✕ بستن پنل</button>
            </div>
            
            <div class="admin-tabs">
                <div class="admin-tab active" onclick="switchAdminTab('posts')">📌 مدیریت پست‌ها</div>
                <div class="admin-tab" onclick="switchAdminTab('settings')">⚙️ تنظیمات سایت</div>
                <div class="admin-tab" onclick="switchAdminTab('orders')">📋 سفارشات</div>
            </div>

            <!-- بخش مدیریت پست‌ها -->
            <div class="admin-section active" id="adminPosts">
                <h3 style="margin-bottom: 20px;">➕ افزودن پست جدید</h3>
                <div class="post-manager">
                    <div class="form-group">
                        <label>عنوان پست</label>
                        <input type="text" id="newPostTitle" placeholder="عنوان پست را وارد کنید">
                    </div>
                    <div class="form-group">
                        <label>خلاصه متن</label>
                        <textarea id="newPostExcerpt" rows="3" placeholder="خلاصه متن پست..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>آیکون (از Font Awesome)</label>
                        <input type="text" id="newPostIcon" placeholder="مثلا: fa-video" value="fa-image">
                    </div>
                    <button class="btn btn-primary" onclick="addPost()">📌 انتشار پست</button>
                </div>
                
                <h3 style="margin: 30px 0 20px;">📋 پست‌های موجود</h3>
                <div id="adminPostsList"></div>
            </div>

            <!-- بخش تنظیمات -->
            <div class="admin-section" id="adminSettings">
                <h3 style="margin-bottom: 20px;">🎨 تنظیمات ظاهری</h3>
                <div class="form-group">
                    <label>عنوان سایت</label>
                    <input type="text" id="siteTitleInput" placeholder="ثارالله">
                </div>
                <div class="form-group">
                    <label>زیرعنوان سایت</label>
                    <input type="text" id="siteSubtitleInput" placeholder="موسسه تولیدات رسانه‌ای مذهبی">
                </div>
                <div class="logo-upload">
                    <div class="current-logo" id="adminLogoPreview">⚔️</div>
                    <div>
                        <label style="display: block; margin-bottom: 10px;">آیکون لوگو (ایموجی یا آیکون)</label>
                        <input type="text" id="logoIconInput" placeholder="⚔️" style="width: 200px;">
                    </div>
                </div>
                <div class="form-group">
                    <label>تم پیش‌فرض</label>
                    <select id="defaultTheme">
                        <option value="dark">تیره (شب)</option>
                        <option value="light">روشن (روز)</option>
                    </select>
                </div>
                <button class="save-settings" onclick="saveSettings()">💾 ذخیره تنظیمات</button>
            </div>

            <!-- بخش سفارشات -->
            <div class="admin-section" id="adminOrders">
                <h3 style="margin-bottom: 20px;">📋 سفارشات ثبت شده</h3>
                <div id="adminOrdersList">
                    <p style="color: var(--text-secondary);">هنوز سفارشی ثبت نشده است.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // داده‌های اولیه
        let siteConfig = {
            title: 'ثارالله',
            subtitle: 'موسسه تولیدات رسانه‌ای مذهبی',
            logoIcon: '⚔️',
            theme: 'dark'
        };

        let editors = [
            { name: 'محمد حسینی', role: 'تدوینگر ارشد', skills: ['پریمیر', 'افترافکت', 'داوینچی'], avatar: 'fa-video' },
            { name: 'علی رضایی', role: 'موشن گرافیست', skills: ['افترافکت', 'سینمافوردی', 'بلندر'], avatar: 'fa-film' },
            { name: 'فاطمه موسوی', role: 'طراح گرافیک', skills: ['فتوشاپ', 'ایلاستریتور', 'ایندیزاین'], avatar: 'fa-palette' },
            { name: 'حسن کریمی', role: 'صدابردار', skills: ['ادیوشن', 'کیوبیس', 'اف‌ال استودیو'], avatar: 'fa-microphone' }
        ];

        let posts = [
            { id: 1, title: 'مستند عاشورایی "کاروان عشق"', excerpt: 'جدیدترین مستند موسسه ثارالله با موضوع پیاده‌روی اربعین و روایت دلدادگان حسینی...', icon: 'fa-video', date: '1403-07-15', pinned: true },
            { id: 2, title: 'موشن گرافیک "حدیث کساء"', excerpt: 'موشن گرافیک زیبا و تاثیرگذار با موضوع حدیث شریف کساء و فضائل اهل بیت(ع)...', icon: 'fa-film', date: '1403-07-10', pinned: false },
            { id: 3, title: 'پادکست "سلوک عاشورایی" - قسمت سوم', excerpt: 'سومین قسمت از مجموعه پادکست‌های سلوک عاشورایی با موضوع سبک زندگی حسینی...', icon: 'fa-podcast', date: '1403-07-05', pinned: false },
        ];

        let orders = [];

        // بارگذاری از LocalStorage
        function loadData() {
            const savedConfig = localStorage.getItem('sarallah_config');
            const savedPosts = localStorage.getItem('sarallah_posts');
            const savedOrders = localStorage.getItem('sarallah_orders');

            if (savedConfig) siteConfig = JSON.parse(savedConfig);
            if (savedPosts) posts = JSON.parse(savedPosts);
            if (savedOrders) orders = JSON.parse(savedOrders);

            applyConfig();
            renderEditors();
            renderPosts();
            renderAdminPosts();
            renderOrders();
        }

        function saveData() {
            localStorage.setItem('sarallah_config', JSON.stringify(siteConfig));
            localStorage.setItem('sarallah_posts', JSON.stringify(posts));
            localStorage.setItem('sarallah_orders', JSON.stringify(orders));
        }

        // اعمال تنظیمات
        function applyConfig() {
            document.getElementById('siteTitleDisplay').textContent = siteConfig.title;
            document.getElementById('headerLogo').textContent = siteConfig.logoIcon;
            document.getElementById('siteTitleInput').value = siteConfig.title;
            document.getElementById('siteSubtitleInput').value = siteConfig.subtitle;
            document.getElementById('logoIconInput').value = siteConfig.logoIcon;
            document.getElementById('defaultTheme').value = siteConfig.theme;
            document.getElementById('adminLogoPreview').textContent = siteConfig.logoIcon;

            if (siteConfig.theme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('themeIcon').className = 'fas fa-moon';
            }

            // به‌روزرسانی زیرعنوان
            document.querySelector('.site-subtitle').textContent = siteConfig.subtitle;
        }

        // تغییر تم
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            siteConfig.theme = isLight ? 'light' : 'dark';
            document.getElementById('themeIcon').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            saveData();
        }

        // رندر ویرایشگرها
        function renderEditors() {
            const grid = document.getElementById('editorsGrid');
            grid.innerHTML = editors.map(editor => `
                <div class="editor-card">
                    <div class="editor-avatar">
                        <i class="fas ${editor.avatar}"></i>
                    </div>
                    <h3 class="editor-name">${editor.name}</h3>
                    <p class="editor-role">${editor.role}</p>
                    <div class="editor-skills">
                        ${editor.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // رندر پست‌ها
        function renderPosts() {
            const grid = document.getElementById('postsGrid');
            const sortedPosts = [...posts].sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return 0;
            });

            grid.innerHTML = sortedPosts.map(post => `
                <div class="post-card ${post.pinned ? 'pinned' : ''}">
                    ${post.pinned ? '<span class="pinned-badge">📌 سنجاق شده</span>' : ''}
                    <div class="post-image">
                        <i class="fas ${post.icon}"></i>
                    </div>
                    <div class="post-content">
                        <h3 class="post-title">${post.title}</h3>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <p class="post-date">
                            <i class="fas fa-calendar-alt"></i> ${post.date}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        // رندر پست‌ها در پنل مدیریت
        function renderAdminPosts() {
            const container = document.getElementById('adminPostsList');
            container.innerHTML = posts.map(post => `
                <div class="post-manager">
                    <h4>${post.title} ${post.pinned ? '📌' : ''}</h4>
                    <p style="color: var(--text-secondary); margin: 10px 0;">${post.excerpt}</p>
                    <small>تاریخ: ${post.date}</small>
                    <div style="margin-top: 15px;">
                        <button class="btn btn-warning" onclick="togglePin(${post.id})">
                            ${post.pinned ? 'برداشتن سنجاق' : '📌 سنجاق'}
                        </button>
                        <button class="btn btn-danger" onclick="deletePost(${post.id})">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        // رندر سفارشات
        function renderOrders() {
            const container = document.getElementById('adminOrdersList');
            if (orders.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">هنوز سفارشی ثبت نشده است.</p>';
                return;
            }
            container.innerHTML = orders.map((order, index) => `
                <div class="post-manager">
                    <h4>${order.name} - ${order.type}</h4>
                    <p style="color: var(--text-secondary);">تلفن: ${order.phone}</p>
                    <p>${order.description}</p>
                    <small>تاریخ: ${order.date}</small>
                    <div style="margin-top: 10px;">
                        <button class="btn btn-danger" onclick="deleteOrder(${index})">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        // افزودن پست
        function addPost() {
            const title = document.getElementById('newPostTitle').value.trim();
            const excerpt = document.getElementById('newPostExcerpt').value.trim();
            const icon = document.getElementById('newPostIcon').value.trim() || 'fa-image';

            if (!title || !excerpt) {
                alert('لطفا عنوان و متن پست را وارد کنید.');
                return;
            }

            const newPost = {
                id: Date.now(),
                title,
                excerpt,
                icon,
                date: new Date().toLocaleDateString('fa-IR'),
                pinned: false
            };

            posts.unshift(newPost);
            saveData();
            renderPosts();
            renderAdminPosts();

            document.getElementById('newPostTitle').value = '';
            document.getElementById('newPostExcerpt').value = '';
            document.getElementById('newPostIcon').value = 'fa-image';
        }

        // حذف پست
        function deletePost(id) {
            if (confirm('آیا از حذف این پست اطمینان دارید؟')) {
                posts = posts.filter(p => p.id !== id);
                saveData();
                renderPosts();
                renderAdminPosts();
            }
        }

        // سنجاق/برداشتن سنجاق پست
        function togglePin(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                post.pinned = !post.pinned;
                saveData();
                renderPosts();
                renderAdminPosts();
            }
        }

        // ثبت سفارش
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const order = {
                name: formData.get('name') || this.querySelector('input[type="text"]').value,
                phone: this.querySelector('input[type="tel"]').value,
                type: this.querySelector('select').value,
                description: this.querySelector('textarea').value,
                date: new Date().toLocaleDateString('fa-IR')
            };

            orders.push(order);
            saveData();
            renderOrders();
            closeOrderModal();
            alert('✅ سفارش شما با موفقیت ثبت شد. همکاران ما به زودی با شما تماس خواهند گرفت.');
            this.reset();
        });

        // حذف سفارش
        function deleteOrder(index) {
            if (confirm('آیا از حذف این سفارش اطمینان دارید؟')) {
                orders.splice(index, 1);
                saveData();
                renderOrders();
            }
        }

        // ذخیره تنظیمات
        function saveSettings() {
            siteConfig.title = document.getElementById('siteTitleInput').value || 'ثارالله';
            siteConfig.subtitle = document.getElementById('siteSubtitleInput').value || 'موسسه تولیدات رسانه‌ای مذهبی';
            siteConfig.logoIcon = document.getElementById('logoIconInput').value || '⚔️';
            siteConfig.theme = document.getElementById('defaultTheme').value;

            saveData();
            applyConfig();
            alert('✅ تنظیمات با موفقیت ذخیره شد.');
        }

        // مدیریت مودال‌ها و پنل‌ها
        function openOrderModal() {
            document.getElementById('orderModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function openAdminPanel() {
            document.getElementById('adminPanel').classList.add('active');
            document.body.style.overflow = 'hidden';
            renderAdminPosts();
            renderOrders();
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.remove('active');
            document.body.style.overflow = '';
        }

        function switchAdminTab(tabName) {
            document.querySelectorAll('.admin-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.admin-section').forEach(section => section.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('admin' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).classList.add('active');
        }

        // بستن مودال با کلیک خارج از آن
        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) closeOrderModal();
        });

        // بارگذاری اولیه
        loadData();
    </script>
</body>
</html>
